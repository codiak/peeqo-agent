<!doctype html>
<html>
    <head>
        <title></title>
        <link rel="stylesheet" type="text/css" href="./css/style.css" />
    </head>

    <body>
        <div class="debug-panel">
            <a href="#" id="wakeword">Wakeword</a>
        </div>
        <div id="eyeWrapper" class="wrapper">
            <svg id="eyes"></svg>
            <img src="./media/imgs/glasses/glass-regular.png" id="glasses" />
        </div>

        <div id="cameraWrapper" class="wrapper">
            <img id="cameraFeed" src="" />
        </div>

        <div id="pictureWrapper" class="wrapper">
            <img id="pictureCapture" src="" />
        </div>

        <div id="videoWrapper" class="wrapper">
            <video src="" id="video" autoplay></video>
        </div>

        <div id="gifWrapper" class="wrapper">
            <img src="" id="gif" />
        </div>

        <div id="textWrapper" class="wrapper">
            <h1 id="textOverlay"></h1>
        </div>

        <div id="speech-bubble"></div>

        <div id="status-bar">
            <div id="status-loading"></div>
            <div id="status-recording"></div>
        </div>

        <audio id="sound" src=""></audio>

        <script src="./js/global.js"></script>
    </body>
</html>
